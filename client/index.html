<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- ✅ viewport-fit=cover indispensable pour env(safe-area-inset-bottom) sur Android/iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <!-- ✅ Couleur pêche cohérente avec l'app -->
    <meta name="theme-color" content="#FF8C69" />
    <meta name="description" content="Recevez chaque jour une citation inspirante adaptée à votre humeur" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Citations" />
    
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <title>Citations Motivantes - Ta dose quotidienne d'inspiration</title>
  </head>
  <body>
    <div id="root"></div>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            console.log('✅ Service Worker enregistré:', registration.scope);
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('🔄 Nouvelle version disponible');
                  }
                });
              }
            });
          } catch (error) {
            console.error('❌ Erreur Service Worker:', error);
          }
        });
      } else {
        console.warn('⚠️ Service Worker non supporté');
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
